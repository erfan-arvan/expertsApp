<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proposal Defense Availability</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
}

table {
  border-collapse: collapse;
  width: 100%;
}

th, td {
  border: 1px solid #ccc;
  text-align: center;
  padding: 6px;
  font-size: 12px;
}

th {
  background: #f5f5f5;
}

.slot {
  cursor: pointer;
}

.yes { background: #4CAF50; color: white; }
.maybe { background: orange; color: white; }
.no { background: #e74c3c; color: white; }

button {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>Proposal Defense Availability</h2>
<p id="email-display"></p>

<table id="table"></table>

<button onclick="save()">Save</button>

<script>
const days = [
  "May 4",
  "May 5",
  "May 6",
  "May 7",
  "May 8",
  "May 11",
  "May 12",
  "May 13"
];

const slots = [];

for (let h = 8; h < 17; h++) {
  slots.push(`${h}:00`);
  slots.push(`${h}:30`);
}

// Add final slot manually
slots.push("16:30"); // 4:30 PM

let state = {}; // day -> slot -> value

// =====================
// Get email from URL
// =====================
const params = new URLSearchParams(window.location.search);
const email = params.get("email");

if (!email) {
  alert("Missing email in URL");
}

document.getElementById("email-display").innerText = "Email: " + email;

// =====================
// Build table
// =====================
function buildTable() {
  const table = document.getElementById("table");

  let html = "<tr><th>Day / Time</th>";
  slots.forEach(s => html += `<th>${s}</th>`);
  html += "</tr>";

  days.forEach(day => {
    html += `<tr><th>${day}</th>`;
    slots.forEach(slot => {
      html += `<td class="slot" data-day="${day}" data-slot="${slot}"></td>`;
    });
    html += "</tr>";
  });

  table.innerHTML = html;

  document.querySelectorAll(".slot").forEach(cell => {
    cell.onclick = () => toggle(cell);
  });
}

// =====================
// Toggle state
// =====================
function toggle(cell) {
  const day = cell.dataset.day;
  const slot = cell.dataset.slot;

  if (!state[day]) state[day] = {};

  const current = state[day][slot] || 0;
  const next = (current + 1) % 4; // 0 empty,1 yes,2 maybe,3 no

  state[day][slot] = next;
  renderCell(cell, next);
}

// =====================
function renderCell(cell, val) {
  cell.className = "slot";

  if (val === 1) {
    cell.classList.add("yes");
    cell.innerText = "Yes";
  } else if (val === 2) {
    cell.classList.add("maybe");
    cell.innerText = "Maybe";
  } else if (val === 3) {
    cell.classList.add("no");
    cell.innerText = "No";
  } else {
    cell.innerText = "";
  }
}

// =====================
// Load from server
// =====================
function load() {
  fetch("/get_proposal_availability", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email })
  })
  .then(res => res.json())
  .then(data => {
    if (!data.exists) return;

    state = data.data.availability || {};

    document.querySelectorAll(".slot").forEach(cell => {
      const day = cell.dataset.day;
      const slot = cell.dataset.slot;
      const val = state?.[day]?.[slot] || 0;
      renderCell(cell, val);
    });
  });
}

// =====================
// Save
// =====================
function save() {
  fetch("/save_proposal_availability", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: email,
      availability: state
    })
  })
  .then(res => {
    if (res.ok) alert("Saved!");
    else alert("Error saving");
  });
}

// =====================
buildTable();
load();
</script>

</body>
</html>
